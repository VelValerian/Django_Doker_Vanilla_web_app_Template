{% load static %}
<!-- Analytics -->
{% if not debug %}
{% if site_settings.analytics_id_ga4 %}
<!-- Google Tag (g{% load static %}tag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site_settings.analytics_id_ga4 }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site_settings.analytics_id_ga4 }}');
</script>
{% endif %}

{% if site_settings.analytics_id_metrica %}
<!-- Yandex.Metrika counter -->
<script type="text/javascript">
    (function (m, e, t, r, i, k, a) {
        m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments) };
        m[i].l = 1 * new Date();
        for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
        k = e.createElement(t), a = e.getElementsByTagName(t)[0], k.async = 1, k.src = r, a.parentNode.insertBefore(k, a)
    })
        (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

    ym({{ site_settings.analytics_id_metrica }}, "init", {
        clickmap: true,
        trackLinks: true,
        accurateTrackBounce: true,
        webvisor: true
    });
</script>
<noscript>
    <div><img src="https://mc.yandex.ru/watch/{{ site_settings.analytics_id_metrica }}"
            style="position:absolute; left:-9999px;" alt="" /></div>
</noscript>
<!-- /Yandex.Metrika counter -->
{% endif %}
{% endif %}
