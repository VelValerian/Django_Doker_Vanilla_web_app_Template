# 🌀 NGINX PROJECT CONFIG (V2.0)
# This configuration proxies to Django and serves static/media files directly.

upstream web_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # 🔧 LOGGING SETTINGS
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 🧱 STATIC FILES (DIRECT DELIVERY)
    location /static/ {
        alias /src/web/collected_static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 🧱 MEDIA FILES (DIRECT DELIVERY)
    location /media/ {
        alias /src/web/media/;
    }

    # 🧬 DJANGO PROXY ENGINE
    location / {
        proxy_pass http://web_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Security Buffers (Prevent "Slowloris" attacks)
        client_max_body_size 20M;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }
}
