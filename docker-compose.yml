# 🐳 BRANDNAME INFRASTRUCTURE (V2.1)
# Production-ready stack with Nginx Sidecar, Postgres, Redis, and Web.

services:
  # 🗄️ DATABASE: Postgres 16
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - ./dbdata/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # 🏗️ CACHE: Redis 7
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # 🌀 WEB: Django 5.2 (Python 3.13)
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    volumes:
      - .:/src/
      - ./dbdata/media:/src/web/media/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # 🛡️ PROXY: Nginx (The Shield)
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - .:/src/
      - ./dbdata/media:/src/web/media/
    depends_on:
      - web
    networks:
      - internal

  # 🎨 STYLES: Sass Compiler (Node 20)
  styles:
    build:
      context: .
      dockerfile: docker/styles/Dockerfile
    volumes:
      - .:/src/
    networks:
      - internal

networks:
  internal:
    driver: bridge
